spring.application.name=bookstore-spring-boot-ioc

# Default to H2 In-Memory database so it runs instantly
spring.datasource.url=jdbc:h2:mem:bookstoredb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Spring/Hibernate manage the schemas automatically
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ------------------------------------------------------------------
